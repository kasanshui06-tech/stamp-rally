<!DOCTYPE html>
<html>
<head>
  <title>スタンプラリー</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 15px auto;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .stamp {
      font-size: 20px;
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      background: #eee;
    }

    .clear {
      background: #4CAF50;
      color: white;
    }

    .complete {
      margin-top: 20px;
      font-size: 22px;
      color: #ff9800;
      font-weight: bold;
    }
  </style>

</head>

<body onload="checkStatus()">

<h1>🌍 地域スタンプラリー</h1>

<div class="card">
  <div id="s1" class="stamp">スポット①</div>
  <div id="s2" class="stamp">スポット②</div>
  <div id="s3" class="stamp">スポット③</div>
</div>

<div id="complete" class="complete"></div>

<script>
function checkStatus() {
  let count = 0;

  if(localStorage.getItem("spot1") === "clear"){
    document.getElementById("s1").classList.add("clear");
    count++;
  }

  if(localStorage.getItem("spot2") === "clear"){
    document.getElementById("s2").classList.add("clear");
    count++;
  }

  if(localStorage.getItem("spot3") === "clear"){
    document.getElementById("s3").classList.add("clear");
    count++;
  }

  if(count === 3){
    document.getElementById("complete").innerText = "🎉コンプリート！";
  }
}
</script>

</body>
</html>
