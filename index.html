<!DOCTYPE html>
<html>
<head>
  <title>スタンプラリー（地図風）</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background: #eaf6ff;
    }

    h1 {
      margin: 15px;
      color: #333;
    }

    .map {
      position: relative;
      width: 90%;
      max-width: 500px;
      height: 500px;
      margin: 20px auto;
      background: url('https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=800&q=60');
      background-size: cover;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .spot {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      border: 2px solid #333;
      transition: 0.2s;
    }

    .spot:active {
      transform: scale(0.9);
    }

    .clear {
      background: #4CAF50;
      color: white;
      border: none;
    }

    .complete {
      font-size: 22px;
      margin-top: 10px;
      color: #ff9800;
      font-weight: bold;
    }

    /* スタンプ帳 */
    #stamp-area img {
      width: 80px;
      margin: 10px;
    }
  </style>
</head>

<body onload="checkStatus()">

<h1>🗺️ スタンプラリー</h1>

<div class="map">
  <div id="s1" class="spot" style="top:20%; left:30%;" onclick="stamp1()">①</div>
  <div id="s2" class="spot" style="top:50%; left:60%;" onclick="stamp2()">②</div>
  <div id="s3" class="spot" style="top:70%; left:25%;" onclick="stamp3()">③</div>
</div>

<div id="complete" class="complete"></div>

<h2>スタンプ帳</h2>
<div id="stamp-area"></div>

<script>
function stamp1() {
  localStorage.setItem("spot1", "clear");
  checkStatus();
}

function stamp2() {
  localStorage.setItem("spot2", "clear");
  checkStatus();
}

function stamp3() {
  localStorage.setItem("spot3", "clear");
  checkStatus();
}

function checkStatus() {
  let count = 0;

  // リセット
  document.getElementById("stamp-area").innerHTML = "";

  if(localStorage.getItem("spot1") === "clear"){
    document.getElementById("s1").classList.add("clear");
    document.getElementById("stamp-area").innerHTML +=
      '<img src="stamp.png">';
    count++;
  }

  if(localStorage.getItem("spot2") === "clear"){
    document.getElementById("s2").classList.add("clear");
    document.getElementById("stamp-area").innerHTML +=
      '<img src="stamp2.png">';
    count++;
  }

  if(localStorage.getItem("spot3") === "clear"){
    document.getElementById("s3").classList.add("clear");
    document.getElementById("stamp-area").innerHTML +=
      '<img src="stamp3.png">';
    count++;
  }

  if(count === 3){
    document.getElementById("complete").innerHTML =
      "🎉コンプリート！<br><img src='https://illustimage.com/photo/814.png?20160715' width='120'>";
  }
}
</script>

</body>
</html>
