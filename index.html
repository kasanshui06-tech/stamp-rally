<!DOCTYPE html>
<html>
<head>
  <title>スタンプラリー</title>
</head>
<body>

<h1>地域スタンプラリー</h1>

<button onclick="stamp1()">スポット①</button>
<button onclick="stamp2()">スポット②</button>
<button onclick="stamp3()">スポット③</button>

<p id="result"></p>

<script>
function stamp1() {
  document.getElementById("result").innerText = "①クリア！";
}

function stamp2() {
  document.getElementById("result").innerText = "②クリア！";
}

function stamp3() {
  document.getElementById("result").innerText = "③クリア！";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>スタンプラリー</title>
</head>
<body onload="checkStatus()">

<h1>地域スタンプラリー</h1>

<button onclick="stamp1()">スポット①</button>
<button onclick="stamp2()">スポット②</button>
<button onclick="stamp3()">スポット③</button>

<p id="status"></p>

<script>
function stamp1() {
  localStorage.setItem("spot1", "clear");
  alert("①クリア！");
}

function stamp2() {
  localStorage.setItem("spot2", "clear");
  alert("②クリア！");
}

function stamp3() {
  localStorage.setItem("spot3", "clear");
  alert("③クリア！");
}

function checkStatus() {
  let result = "";

  if(localStorage.getItem("spot1") === "clear"){
    result += "①クリア済み<br>";
  }
  if(localStorage.getItem("spot2") === "clear"){
    result += "②クリア済み<br>";
  }
  if(localStorage.getItem("spot3") === "clear"){
    result += "③クリア済み<br>";
  }

  document.getElementById("status").innerHTML = result;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>スタンプラリー</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 15px auto;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .stamp {
      font-size: 20px;
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      background: #eee;
    }

    .clear {
      background: #4CAF50;
      color: white;
    }

    .complete {
      margin-top: 20px;
      font-size: 22px;
      color: #ff9800;
      font-weight: bold;
    }
  </style>

</head>

<body onload="checkStatus()">

<h1>🌍 地域スタンプラリー</h1>

<div class="card">
  <div id="s1" class="stamp">スポット①</div>
  <div id="s2" class="stamp">スポット②</div>
  <div id="s3" class="stamp">スポット③</div>
</div>

<div id="complete" class="complete"></div>

<script>
function checkStatus() {
  let count = 0;

  if(localStorage.getItem("spot1") === "clear"){
    document.getElementById("s1").classList.add("clear");
    count++;
  }
  if(localStorage.getItem("spot2") === "clear"){
    document.getElementById("s2").classList.add("clear");
    count++;
  }
  if(localStorage.getItem("spot3") === "clear"){
    document.getElementById("s3").classList.add("clear");
    count++;
  }

  if(count === 3){
    document.getElementById("complete").innerText = "🎉コンプリート！";
  }
}
</script>

</body>
</html>

<html>

      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      background: white;
    }

    img {
      width: 70px;
    }
  </style>
</head>

<body onload="checkStamp()">

<h1>地域スタンプラリー</h1>

<div class="stamp-box">
  <div id="s1" class="stamp">①</div>
  <div id="s2" class="stamp">②</div>
  <div id="s3" class="stamp">③</div>
</div>

<h2 id="goal"></h2>

<script>
function checkStamp() {

  if(localStorage.getItem("spot1")){
    document.getElementById("s1").innerHTML = "<img src='https://cdn-icons-png.flaticon.com/512/190/190411.png'>";
  }

  if(localStorage.getItem("spot2")){
    document.getElementById("s2").innerHTML = "<img src='https://cdn-icons-png.flaticon.com/512/190/190411.png'>";
  }

  if(localStorage.getItem("spot3")){
    document.getElementById("s3").innerHTML = "<img src='https://cdn-icons-png.flaticon.com/512/190/190411.png'>";
  }

  if(localStorage.getItem("spot1") && localStorage.getItem("spot2") && localStorage.getItem("spot3")){
    document.getElementById("goal").innerText = "🎉コンプリート！";
  }
}
</script>

</body>
</html>
