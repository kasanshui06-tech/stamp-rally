<!DOCTYPE html>
<html>
<head>
  <title>スポット①</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .content {
      padding: 15px;
    }

    h1 {
      margin: 10px 0;
    }

    .comment {
      background: #fff3cd;
      padding: 10px;
      border-radius: 10px;
      margin: 10px 0;
      font-size: 14px;
    }

    .mission {
      background: #e3f2fd;
      padding: 10px;
      border-radius: 10px;
      margin: 10px 0;
      font-weight: bold;
    }
  </style>

</head>

<body onload="getStamp()">

<div class="container">

  <!-- 写真 -->
  <img src="https://via.placeholder.com/400x200">

  <div class="content">
    <h1>スポット①</h1>

    <!-- 地域の人のコメント -->
    <div class="comment">
      「ここは昔から地元の人に愛されている場所です！ぜひゆっくり見ていってください。」
    </div>

    <!-- ミッション -->
    <div class="mission">
      ミッション：おすすめを1つ聞いてみよう！
    </div>

    <p>スタンプ取得中...</p>
  </div>

</div>

<script>
function getStamp() {
  localStorage.setItem("spot1", "clear");
  setTimeout(() => {
    alert("①クリア！");
    window.location.href = "index.html";
  }, 1000);
}
</script>

</body>
</html>
