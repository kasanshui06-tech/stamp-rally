<!DOCTYPE html>

    .card {
      background: white;

      background: #e3f2fd;

<body onload="getStamp()">

  <p>地域の人コメント：ここは昔から人気の場所です！</p>

  <div class="mission">
    ミッション：おすすめを1つ聞こう！
  </div>

  <p>スタンプ取得中...</p>

</div>

<script>
function getStamp(){
  localStorage.setItem("spot1","clear");

  setTimeout(() => {
    alert("①スタンプGET！");
    window.location.href = "index.html";
  }, 800);
}
</script>

</body>
</html>
